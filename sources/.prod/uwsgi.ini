[uwsgi]
# https://uwsgi-docs.readthedocs.io/en/latest/Options.html
strict = true  # Fail if any option is unknown

# Use base ini file to configure common settings
include = /etc/uwsgi/uwsgi-base.ini

http-socket = :8080
chdir = /app
module = sources.wsgi
uid = nobody
gid = nogroup
master = 1
processes = 2
threads = 2
static-map = /static=/app/static
; don't log readiness and healtzh endpoints
route = ^/readiness$ donotlog:
route = ^/healthz$ donotlog:
